<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>旅行比較サイト｜四国ルート</title>
<style>
:root{--navy:#0b1e33;--deep:#06131f;--gold:#c9a35c;--gold2:#e8cc86;--cream:#f7f1e5;--paper:#fffaf2;--white:#fff;--ink:#1b2530;--muted:#687382;--line:rgba(201,163,92,.28);--shadow:0 32px 90px rgba(6,22,38,.22);--radius:30px;}
*{box-sizing:border-box}html{scroll-behavior:smooth;-webkit-text-size-adjust:100%;}body{margin:0;font-family:"Hiragino Mincho ProN","Yu Mincho",serif;background:linear-gradient(180deg,#fffaf2,#f7f1e5);color:var(--ink);overflow-x:hidden;}
header{position:fixed;top:0;left:0;right:0;z-index:10;padding:18px 28px;background:rgba(6,19,31,.72);backdrop-filter:blur(14px);}
.logo{display:inline-block;color:#fff;text-decoration:none;font-weight:800;letter-spacing:.12em;font-size:.95rem;}
.hero{min-height:100vh;display:grid;place-items:center;padding:96px 20px 56px;background:radial-gradient(circle at 20% 20%,rgba(232,204,134,.38),transparent 32%),linear-gradient(135deg,var(--deep),var(--navy));}
.hero-inner{width:min(900px,calc(100% - 32px));padding:54px;border:1px solid rgba(232,204,134,.35);border-radius:var(--radius);background:rgba(255,250,242,.94);box-shadow:var(--shadow);text-align:center;}
.kicker{color:var(--gold);font-weight:900;letter-spacing:.18em;font-size:.82rem;margin-bottom:18px;}
h1{margin:0;font-size:clamp(2.5rem,8vw,5.2rem);line-height:1.05;color:var(--navy);letter-spacing:.05em;}
p{line-height:1.9;font-size:1.08rem;color:#3c4654;}
.message{margin:28px auto 0;padding:22px;border-radius:22px;background:#fff;border:1px solid var(--line);max-width:640px;font-weight:700;}
.btn-row{display:flex;justify-content:center;gap:14px;flex-wrap:wrap;margin-top:32px;}.btn{display:inline-flex;align-items:center;justify-content:center;min-height:46px;padding:13px 22px;border-radius:999px;text-decoration:none;font-weight:800;line-height:1.4;}.primary{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--deep);}.secondary{background:rgba(11,30,51,.08);color:var(--navy);border:1px solid rgba(11,30,51,.15);}
footer{text-align:center;padding:28px 16px;color:var(--muted);font-size:.92rem;}
@media(max-width:820px){header{padding:16px}.hero{padding:82px 12px 42px}.hero-inner{padding:30px 20px;border-radius:24px}.btn-row{flex-direction:column}.btn{width:100%;white-space:normal}.logo{font-size:.82rem;white-space:normal}.message{padding:18px}}
@media(max-width:430px){h1{font-size:2.25rem}p{font-size:.94rem}.hero-inner{padding:24px 16px}}
</style>
</head>
<body>
<header><a class="logo" href="index.html">TRAVEL COMPARISON</a></header>
<main class="hero">
  <section class="hero-inner">
    <div class="kicker">SHIKOKU ROUTE</div>
    <h1>四国ルート</h1>
    <p class="message">四国ルートは準備中です。9月中旬に更新予定。</p>
    <div class="btn-row">
      <a class="btn primary" href="index.html">トップページへ戻る</a>
      <a class="btn secondary" href="yamaguchi.html">山口ルートを見る</a>
    </div>
  </section>
</main>
<footer>Travel Comparison Site</footer>
</body>
</html>
